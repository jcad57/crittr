# Supabase local / deploy config (minimal). Adjust project_id when linking CLI.

# When the dashboard has “Verify JWT with legacy secret” enabled, the gateway
# can reject access tokens signed with the newer JWT Signing Keys (401 before
# this function runs). Auth is still enforced inside the handler via getUser().
[functions.create-subscription-payment-sheet]
verify_jwt = false

[functions.stripe-webhook]
verify_jwt = false

[functions.sync-crittr-pro-entitlement]
verify_jwt = false

[functions.crittr-ai-chat]
verify_jwt = false

# Same as other user-invoked functions: gateway JWT verify can fail with ES256
# (JWT Signing Keys) before the handler runs. Auth is enforced via getUser() inside.
[functions.parse-medical-record]
verify_jwt = false

[functions.submit-feedback]
verify_jwt = false

[functions.get-subscription-details]
verify_jwt = false

[functions.cancel-subscription]
verify_jwt = false

[functions.create-billing-portal-session]
verify_jwt = false

[functions.get-pro-pricing]
verify_jwt = false
